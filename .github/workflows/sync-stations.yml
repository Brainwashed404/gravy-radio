name: Sync Stations from Google Form

on:
  schedule:
    - cron: '0 * * * *'  # every hour fallback
  workflow_dispatch:       # triggered by Google Apps Script on form submit or sheet edit

permissions:
  contents: write

concurrency:
  group: sync-stations
  cancel-in-progress: false  # queue rather than cancel, so no edits are lost

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Sync stations
        id: sync
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          CI: true
        run: node scripts/sync-stations.mjs

      - name: Build
        run: npm run build

      - name: Commit and push if changed
        run: |
          git config user.name "lucky-breaks-bot"
          git config user.email "bot@luckybreaks.xyz"
          git stash --include-untracked
          git pull --rebase origin main
          git stash pop
          git add src/data/stations.ts
          if ! git diff --staged --quiet; then
            git commit -m "Sync stations from sheet"
            git push
          else
            echo "Nothing new to commit"
          fi
